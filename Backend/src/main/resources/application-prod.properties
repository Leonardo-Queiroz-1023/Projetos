spring.application.name=Projetos

# PostgreSQL Configuration (Render auto-configura via DATABASE_URL)
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:/data/projetosdb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# H2 Console desabilitado em produção
spring.h2.console.enabled=false

# Static Resources
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.add-mappings=true

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN
