services:
  # PostgreSQL Database
  - type: pserv
    name: projetos-db
    plan: free
    env: docker
    region: oregon
    
  # Web Service
  - type: web
    name: meu-projeto-final
    plan: free
    runtime: docker
    
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: projetos-db
          property: connectionString
      - key: JAVA_OPTS
        value: "-Xmx512m -Xms256m"